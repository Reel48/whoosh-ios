        - label
        - href
        - tagline
        - nav
        - live
    SectionKey:
      type: string
      enum:
        - capital
        - fantasy
        - pool
        - news
      description: >-
        Single source of truth for the signed-in app's section structure.


        The signed-in experience is split into themed sections. Each section
        owns a URL prefix, a `data-theme` scope (see globals.css), and a list of
        sub-pages. Navigation surfaces (AppShell header, desktop sub-nav, mobile
        route strip, bottom tab bar) all read from here instead of hardcoding
        link lists.


        This file is intentionally data-only (no JSX) so it can be imported by
        both server and client components. Icons are resolved by key in the
        client nav components.
    NavItem:
      type: object
      properties:
        href:
          type: string
        label:
          type: string
      required:
        - href
        - label
