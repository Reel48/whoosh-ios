openapi: 3.1.0
info:
  title: Whoosh API
  version: 1.0.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: Client-agnostic JSON API for the Whoosh app (web + iOS). Every
    response is a `{ ok, data }` / `{ ok, error }` envelope. Generated from
    src/lib/api/contracts.ts — do not edit by hand (run `npm run openapi:gen`).
servers:
  - url: /
    description: Same origin as the app deployment.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PlaceWagerRequest:
      type: object
      properties:
        eventId:
          type: number
        outcomeId:
          type: number
        stake:
          type: number
          description: Stake in whole Whoosh Bucks (converted to cents server-side).
      required:
        - eventId
        - outcomeId
        - stake
      description: POST /api/v1/wb/wager — place a wager on an event outcome.
    PlaceWagerResponse:
      type: object
      properties:
        wagerId:
          type: number
      required:
        - wagerId
    WalletResponse:
      $ref: "#/components/schemas/DashboardData"
      description: GET /api/v1/wb/wallet — the signed-in user's Capital/WB dashboard.
    DashboardData:
      type: object
      properties:
        allocation:
          $ref: "#/components/schemas/Allocation"
        lifetime:
          $ref: "#/components/schemas/LifetimeStats"
        returns:
          $ref: "#/components/schemas/ReturnsBreakdown"
        positions:
          type: array
          items:
            $ref: "#/components/schemas/EnrichedPosition"
        balanceSeries:
          type: array
          items:
            $ref: "#/components/schemas/BalanceSeriesPoint"
        dayChangeCents:
          type:
            - number
            - "null"
          description: Today's market move across all holdings (sum of per-position day
            change). Null when no holding has a previous-close to compare
            against.
      required:
        - allocation
        - lifetime
        - returns
        - positions
        - balanceSeries
        - dayChangeCents
    Allocation:
      type: object
      properties:
        cashCents:
          type: number
        investedValueCents:
          type: number
        investedCostBasisCents:
          type: number
        openWagersCents:
          type: number
        totalEquityCents:
          type: number
      required:
        - cashCents
        - investedValueCents
        - investedCostBasisCents
        - openWagersCents
        - totalEquityCents
    LifetimeStats:
      type: object
      properties:
        totalPurchased:
          type: number
        totalPremiumMatch:
          type: number
        totalInterest:
          type: number
        totalTransferIn:
          type: number
        totalTransferOut:
          type: number
        totalBetStake:
          type: number
        totalBetPayout:
          type: number
        totalInvestBuy:
          type: number
        totalInvestSell:
          type: number
        totalInvestDividend:
          type: number
        totalAdjustment:
          type: number
        ledgerRowCount:
          type: number
      required:
        - totalPurchased
        - totalPremiumMatch
        - totalInterest
        - totalTransferIn
        - totalTransferOut
        - totalBetStake
        - totalBetPayout
        - totalInvestBuy
        - totalInvestSell
        - totalInvestDividend
        - totalAdjustment
        - ledgerRowCount
    ReturnsBreakdown:
      type: object
      properties:
        realDollarsInCents:
          type: number
          description: WB credited from real-USD Stripe purchases (already scaled at 10:1
            in the ledger).
        premiumMatchCents:
          type: number
          description: Free WB granted via Premium match.
        interestEarnedCents:
          type: number
          description: Sum of all interest credited.
        wagerPlCents:
          type: number
          description: Net P/L on settled wagers (payouts − stakes). Negative if losing
            overall.
        investingPlCents:
          type: number
          description: Realized + unrealized investing P/L, including dividends received.
        dividendsCents:
          type: number
          description: Total dividends received from stock positions.
        netTransfersCents:
          type: number
          description: Net of all transfers (received − sent).
        adjustmentsCents:
          type: number
          description: Admin adjustments.
        totalReturnCents:
          type: number
          description: "Gameplay gains: interest + wager P/L + investing P/L (incl.
            dividends)."
        totalReturnFraction:
          type: number
          description: Gains as a fraction of principal contributed (equity − gains). 0 if
            no principal.
      required:
        - realDollarsInCents
        - premiumMatchCents
        - interestEarnedCents
        - wagerPlCents
        - investingPlCents
        - dividendsCents
        - netTransfersCents
        - adjustmentsCents
        - totalReturnCents
        - totalReturnFraction
    EnrichedPosition:
      type: object
      properties:
        marketPriceCents:
          type:
            - number
            - "null"
        marketValueCents:
          type:
            - number
            - "null"
        unrealizedCents:
          type:
            - number
            - "null"
        prevCloseCents:
          type:
            - number
            - "null"
          description: Previous session close (per share), or null when the quote lacks it.
        dayChangeCents:
          type:
            - number
            - "null"
          description: Today's market move on this holding (shares × (price − prevClose)),
            or null when there's no previous-close to compare against.
        symbol:
          type: string
        shares:
          type: number
        costBasisCents:
          type: number
      required:
        - costBasisCents
        - dayChangeCents
        - marketPriceCents
        - marketValueCents
        - prevCloseCents
        - shares
        - symbol
        - unrealizedCents
    BalanceSeriesPoint:
      type: object
      properties:
        day:
          type: string
        balanceCents:
          type: number
      required:
        - day
        - balanceCents
    TransferRequest:
      type: object
      properties:
        recipient:
          type: string
        amount:
          type: number
          description: Amount in whole WB; or pass `amountCents` directly.
        amountCents:
          type: number
        memo:
          type: string
      required:
        - recipient
      description: POST /api/v1/wb/transfer — send WB to another user by username.
    TransferResponse:
      type: object
      properties:
        transferId:
          type: number
      required:
        - transferId
    InvestOrderRequest:
      type: object
      properties:
        symbol:
          type: string
        side:
          type: string
          enum:
            - buy
            - sell
        amount:
          type: number
          description: USD amount (whole dollars) — or pass `shares`.
        shares:
          type: number
      required:
        - symbol
        - side
      description: POST /api/v1/wb/invest/order — buy/sell a symbol by USD amount or shares.
    InvestOrderResponse:
      type: object
      properties:
        orderId:
          type: number
        totalCents:
          type: number
      required:
        - orderId
        - totalCents
    ClaimBonusResponse:
      type: object
      properties:
        claimed:
          type: boolean
        amountCents:
          type: number
        streak:
          type: number
      required:
        - claimed
        - amountCents
        - streak
      description: POST /api/v1/wb/bonus — claim the daily bonus.
    BonusStatusResponse:
      type: object
      properties:
        available:
          type: boolean
        streak:
          type: number
      required:
        - available
        - streak
      description: GET /api/v1/wb/bonus — is today's bonus still claimable + current streak.
    WatchlistMutateRequest:
      type: object
      properties:
        symbol:
          type: string
        action:
          type: string
          enum:
            - add
            - remove
      required:
        - symbol
        - action
      description: POST /api/v1/wb/watchlist — add/remove a symbol from the watchlist.
    WatchlistMutateResponse:
      type: object
      properties:
        symbol:
          type: string
        watching:
          type: boolean
      required:
        - symbol
        - watching
    WatchlistResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WatchEntry"
      required:
        - items
      description: GET /api/v1/wb/watchlist — the user's watched symbols.
    WatchEntry:
      type: object
      properties:
        symbol:
          type: string
        addedAt:
          type: string
      required:
        - symbol
        - addedAt
    NotificationsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        unread:
          type: number
      required:
        - items
        - unread
      description: GET /api/v1/wb/notifications — recent notifications + unread count.
    Notification:
      type: object
      properties:
        id:
          type: number
        kind:
          $ref: "#/components/schemas/NotificationKind"
        title:
          type: string
        body:
          type:
            - string
            - "null"
        href:
          type:
            - string
            - "null"
        readAt:
          type:
            - string
            - "null"
        createdAt:
          type: string
      required:
        - id
        - kind
        - title
        - body
        - href
        - readAt
        - createdAt
    NotificationKind:
      type: string
      enum:
        - bet_settled
        - dividend
        - transfer_in
        - interest_posted
        - achievement
        - renewal
        - referral
        - system
        - chat_mention
        - chat_dm
    MarkReadResponse:
      type: object
      properties:
        unread:
          type: number
          const: 0
      required:
        - unread
      description: POST /api/v1/wb/notifications — mark all read.
    ActivityResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LedgerEntry"
      required:
        - entries
      description: GET /api/v1/wb/activity — ledger entries (JSON sibling of the CSV
        export).
    LedgerEntry:
      type: object
      properties:
        id:
          type: number
        amountCents:
          type: number
        kind:
          $ref: "#/components/schemas/LedgerKind"
        memo:
          type:
            - string
            - "null"
        createdAt:
          type: string
      required:
        - id
        - amountCents
        - kind
        - memo
        - createdAt
    LedgerKind:
      type: string
      enum:
        - purchase
        - premium_match
        - fantasy_match
        - interest
        - transfer_in
        - transfer_out
        - bet_stake
        - bet_payout
        - invest_buy
        - invest_sell
        - invest_dividend
        - daily_bonus
        - referral_reward
        - adjustment
    EventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/BetEvent"
      required:
        - events
      description: GET /api/v1/wb/events — open house-wager events (with outcomes).
    BetEvent:
      type: object
      properties:
        id:
          type: number
        title:
          type: string
        description:
          type:
            - string
            - "null"
        status:
          $ref: "#/components/schemas/EventStatus"
        createdBy:
          type:
            - string
            - "null"
        closesAt:
          type:
            - string
            - "null"
        settledOutcomeId:
          type:
            - number
            - "null"
        createdAt:
          type: string
        source:
          $ref: "#/components/schemas/EventSource"
        externalEventId:
          type:
            - string
            - "null"
        sportKey:
          type:
            - string
            - "null"
        market:
          anyOf:
            - $ref: "#/components/schemas/BetMarket"
            - type: "null"
        homeTeam:
          type:
            - string
            - "null"
        awayTeam:
          type:
            - string
            - "null"
        commenceTime:
          type:
            - string
            - "null"
        outcomes:
          type: array
          items:
            $ref: "#/components/schemas/BetOutcome"
      required:
        - id
        - title
        - description
        - status
        - createdBy
        - closesAt
        - settledOutcomeId
        - createdAt
        - source
        - externalEventId
        - sportKey
        - market
        - homeTeam
        - awayTeam
        - commenceTime
        - outcomes
    EventStatus:
      type: string
      enum:
        - open
        - locked
        - settled
        - cancelled
    EventSource:
      type: string
      enum:
        - manual
        - odds_api
        - sleeper
    BetMarket:
      type: string
      enum:
        - h2h
        - spreads
        - totals
    BetOutcome:
      type: object
      properties:
        id:
          type: number
        label:
          type: string
        oddsDecimal:
          type: number
        point:
          type:
            - number
            - "null"
        outcomeKey:
          type:
            - string
            - "null"
      required:
        - id
        - label
        - oddsDecimal
        - point
        - outcomeKey
    BetsResponse:
      type: object
      properties:
        wagers:
          type: array
          items:
            $ref: "#/components/schemas/UserWager"
      required:
        - wagers
      description: GET /api/v1/wb/bets — the signed-in user's wagers (newest first).
    UserWager:
      type: object
      properties:
        id:
          type: number
        eventId:
          type: number
        status:
          $ref: "#/components/schemas/WagerStatus"
        stakeCents:
          type: number
        oddsFrozen:
          type: number
        pointFrozen:
          type:
            - number
            - "null"
        createdAt:
          type: string
        payoutCents:
          type: number
          description: "Actual credited amount: full return for won, stake back for
            refunded, else 0."
        potentialCents:
          type: number
          description: What a win returns (stake × frozen odds) — shown for open wagers too.
        outcomeLabel:
          type: string
        event:
          type: object
          properties:
            title:
              type: string
            market:
              anyOf:
                - $ref: "#/components/schemas/BetMarket"
                - type: "null"
            sportKey:
              type:
                - string
                - "null"
            status:
              $ref: "#/components/schemas/EventStatus"
            commenceTime:
              type:
                - string
                - "null"
          required:
            - title
            - market
            - sportKey
            - status
            - commenceTime
      required:
        - id
        - eventId
        - status
        - stakeCents
        - oddsFrozen
        - pointFrozen
        - createdAt
        - payoutCents
        - potentialCents
        - outcomeLabel
        - event
    WagerStatus:
      type: string
      enum:
        - open
        - won
        - lost
        - refunded
    QuoteResponse:
      $ref: "#/components/schemas/Quote"
      description: GET /api/v1/wb/quote?symbol= — a single live quote.
    Quote:
      type: object
      properties:
        symbol:
          type: string
        priceCents:
          type: number
        prevCloseCents:
          type:
            - number
            - "null"
          description: Previous session's close, for day-over-day change. Null when
            unknown (older cached rows backfill on their next fetch).
        fetchedAt:
          type: string
      required:
        - symbol
        - priceCents
        - prevCloseCents
        - fetchedAt
    SymbolDetailResponse:
      type: object
      properties:
        snapshot:
          $ref: "#/components/schemas/StockSnapshot"
        profile:
          anyOf:
            - $ref: "#/components/schemas/CompanyProfile"
            - type: "null"
        quote:
          anyOf:
            - $ref: "#/components/schemas/Quote"
            - type: "null"
      required:
        - snapshot
        - profile
        - quote
      description: GET /api/v1/wb/symbol?symbol=&range= — full stock detail for the
        invest view.
    StockSnapshot:
      type: object
      properties:
        symbol:
          type: string
        longName:
          type:
            - string
            - "null"
        exchange:
          type:
            - string
            - "null"
        currency:
          type: string
        regularMarketPriceCents:
          type:
            - number
            - "null"
        regularMarketDayHighCents:
          type:
            - number
            - "null"
        regularMarketDayLowCents:
          type:
            - number
            - "null"
        fiftyTwoWeekHighCents:
          type:
            - number
            - "null"
        fiftyTwoWeekLowCents:
          type:
            - number
            - "null"
        regularMarketVolume:
          type:
            - number
            - "null"
        candles:
          type: array
          items:
            $ref: "#/components/schemas/Candle"
          description: Daily close candles for the requested range. Oldest first.
      required:
        - symbol
        - longName
        - exchange
        - currency
        - regularMarketPriceCents
        - regularMarketDayHighCents
        - regularMarketDayLowCents
        - fiftyTwoWeekHighCents
        - fiftyTwoWeekLowCents
        - regularMarketVolume
        - candles
    Candle:
      type: object
      properties:
        time:
          type: number
          description: Unix epoch seconds (market close timestamp).
        closeCents:
          type: number
          description: Closing price in cents.
        highCents:
          type: number
          description: Daily high in cents.
        lowCents:
          type: number
          description: Daily low in cents.
      required:
        - time
        - closeCents
        - highCents
        - lowCents
    CompanyProfile:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        industry:
          type:
            - string
            - "null"
        country:
          type:
            - string
            - "null"
        currency:
          type: string
        exchange:
          type:
            - string
            - "null"
        ipo:
          type:
            - string
            - "null"
        logoUrl:
          type:
            - string
            - "null"
        weburl:
          type:
            - string
            - "null"
        marketCap:
          type:
            - number
            - "null"
          description: Market cap in dollars (Finnhub returns millions; we convert to
            dollars).
        shareOutstandingMillions:
          type:
            - number
            - "null"
          description: Shares outstanding in millions.
      required:
        - symbol
        - name
        - industry
        - country
        - currency
        - exchange
        - ipo
        - logoUrl
        - weburl
        - marketCap
        - shareOutstandingMillions
    OrdersResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required:
        - orders
      description: GET /api/v1/wb/orders — the user's recent investing orders.
    Order:
      type: object
      properties:
        id:
          type: number
        symbol:
          type: string
        side:
          type: string
          enum:
            - buy
            - sell
        shares:
          type: number
        priceCents:
          type: number
        totalCents:
          type: number
        createdAt:
          type: string
      required:
        - id
        - symbol
        - side
        - shares
        - priceCents
        - totalCents
        - createdAt
    SearchResult:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        kind:
          type: string
          enum:
            - stock
            - crypto
      required:
        - symbol
        - name
        - kind
      description: GET /api/v1/wb/search?q= — symbol typeahead.
    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
      required:
        - results
    TickerResponse:
      type: object
      properties:
        quotes:
          type: array
          items:
            $ref: "#/components/schemas/TickerQuote"
      required:
        - quotes
      description: GET /api/v1/capital/ticker — market strip quotes (public).
    TickerQuote:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        priceCents:
          type: number
        changePct:
          type: number
      required:
        - symbol
        - name
        - priceCents
        - changePct
    ScoresResponse:
      type: object
      properties:
        games:
          type: array
          items:
            $ref: "#/components/schemas/Game"
      required:
        - games
      description: GET /api/v1/news/scores — live scores (public).
    Game:
      type: object
      properties:
        id:
          type: string
        league:
          type: string
        state:
          type: string
          enum:
            - pre
            - in
            - post
          description: '"pre" (upcoming) | "in" (live) | "post" (final)'
        detail:
          type: string
          description: ESPN's short status line, e.g. "Q3 5:21", "Final", "6/3 - 8:30 PM
            EDT".
        away:
          type: object
          properties:
            abbr:
              type: string
            logo:
              type:
                - string
                - "null"
            score:
              type:
                - string
                - "null"
          required:
            - abbr
            - logo
            - score
          description: Live scores for the ticker. Reads ESPN's free public scoreboard API
            (no key) per league, normalizes each game, and orders them
            live-first. Mirrors the fetch-revalidate pattern used elsewhere; 30s
            revalidation keeps scores fresh without hammering ESPN.
        home:
          type: object
          properties:
            abbr:
              type: string
            logo:
              type:
                - string
                - "null"
            score:
              type:
                - string
                - "null"
          required:
            - abbr
            - logo
            - score
          description: Live scores for the ticker. Reads ESPN's free public scoreboard API
            (no key) per league, normalizes each game, and orders them
            live-first. Mirrors the fetch-revalidate pattern used elsewhere; 30s
            revalidation keeps scores fresh without hammering ESPN.
        link:
          type:
            - string
            - "null"
        startsAt:
          type:
            - string
            - "null"
      required:
        - id
        - league
        - state
        - detail
        - away
        - home
        - link
        - startsAt
    AccountResponse:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        avatarUrl:
          type:
            - string
            - "null"
        discordUserId:
          type:
            - string
            - "null"
        isAdmin:
          type: boolean
        onboarded:
          type: boolean
          description: Whether first-run onboarding is complete — the iOS app branches on
            this.
        premium:
          type: boolean
          description: Whether the user currently holds Whoosh Premium (perk tier).
        auth:
          type: object
          properties:
            hasDiscord:
              type: boolean
            hasPassword:
              type: boolean
            email:
              type:
                - string
                - "null"
            emailVerified:
              type: boolean
          required:
            - hasDiscord
            - hasPassword
            - email
            - emailVerified
        referrals:
          $ref: "#/components/schemas/ReferralStats"
        achievements:
          type: array
          items:
            $ref: "#/components/schemas/EarnedAchievement"
      required:
        - id
        - username
        - avatarUrl
        - discordUserId
        - isAdmin
        - onboarded
        - premium
        - auth
        - referrals
        - achievements
      description: GET /api/v1/account — profile, auth methods, referrals, achievements.
    ReferralStats:
      type: object
      properties:
        code:
          type: string
        totalReferred:
          type: number
        totalRewarded:
          type: number
        totalRewardCents:
          type: number
      required:
        - code
        - totalReferred
        - totalRewarded
        - totalRewardCents
    EarnedAchievement:
      type: object
      properties:
        code:
          $ref: "#/components/schemas/AchievementCode"
        earnedAt:
          type: string
      required:
        - code
        - earnedAt
    AchievementCode:
      type: string
      enum:
        - first_buy
        - first_trade
        - first_win
        - first_dividend
        - first_send
        - thirty_day_holder
        - big_win
        - diversified
      description: "Achievement catalog. Adding one: append to ACHIEVEMENTS and add an
        evaluator call site (or wire into evaluateAfter*). The catalog is the
        source of truth for icon + label — DB only stores the code string."
    UsernameAvailableResponse:
      type: object
      properties:
        available:
          type: boolean
        normalized:
          type: string
          description: The handle normalized to the allowed format (suggested value).
        reason:
          type: string
          description: Why unavailable, when `available` is false.
      required:
        - available
        - normalized
