          anyOf:
            - $ref: "#/components/schemas/FantasyLink"
            - type: "null"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/Section"
      required:
        - capital
        - board
        - topArticle
        - fantasyLink
        - sections
      description: GET /api/v1/home — one call powering the app's logged-in landing screen.
    Section:
      type: object
      properties:
        key:
          $ref: "#/components/schemas/SectionKey"
        label:
          type: string
          description: Short label shown on the hub and as the in-section title.
        href:
          type: string
          description: Section hub URL + the prefix that marks a route as "in" this section.
        tagline:
          type: string
          description: One-liner shown on the /home hub cards.
        nav:
          type: array
          items:
            $ref: "#/components/schemas/NavItem"
          description: Sub-pages shown in the desktop sub-nav and mobile route strip.
        live:
          type: boolean
          description: True once the section has real content; false renders a "coming
            soon".
      required:
