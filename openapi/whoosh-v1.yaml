        already-swiped.
    WhooshEntry:
      type: object
      properties:
        espnId:
          type: string
        sport:
          $ref: "#/components/schemas/SportKey"
        title:
          type: string
        description:
          type:
            - string
            - "null"
        link:
          type: string
        author:
          type:
            - string
            - "null"
        imageUrl:
          type:
            - string
            - "null"
        pubDate:
          type:
            - string
            - "null"
        points:
          type: number
      required:
        - espnId
        - sport
        - title
        - description
        - link
        - author
        - imageUrl
        - pubDate
        - points
    SportKey:
      type: string
      enum:
        - nfl
        - ncf
        - nba
        - mlb
        - soccer
        - nhl
        - golf
        - tennis
        - boxing
        - ncb
        - racing
        - mma
      description: >-
        Thin read-only wrapper over ESPN's JSON news APIs. Mirrors the
        fetch-revalidate pattern in src/lib/sleeper/client.ts (no auth, no key;
        Next's per-fetch data cache serves repeat reads within the window).


        We use the JSON APIs rather than ESPN's public RSS because RSS truncates
        headlines (its <title> is cut off with "…") and carries no images. Two
        JSON endpoints cover every sport, both returning the same article
        shape:  - site.api.espn.com/.../sports/<apiPath>/news  → { articles:
        [...] }  - now.core.api.espn.com/v1/sports/news?sport=  → { headlines:
        [...] }   (boxing)
    Article:
      type: object
      properties:
        title:
          type: string
          description: Full, untruncated headline.
        description:
          type: string
        link:
          type: string
        pubDate:
          type:
            - string
            - "null"
          description: ISO date string from ESPN; formatted in the UI.
        author:
          type:
            - string
            - "null"
        guid:
          type: string
        images:
          type: array
          items:
            type: string
          description: Image URLs for the post, shown at the bottom. Empty when none are
            provided.
        sport:
          $ref: "#/components/schemas/SportKey"
          description: Which sport this article came from (set by `fetchFeed`; key for the
            ALL feed).
      required:
        - title
        - description
        - link
        - pubDate
        - author
        - guid
        - images
