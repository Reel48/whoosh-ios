      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/ChatLeaderboardRow"
      required:
        - rows
      description: GET /api/v1/chat/leaderboard — XP ranking.
    ChatLeaderboardRow:
      type: object
      properties:
        rank:
          type: number
        user:
          $ref: "#/components/schemas/ChatAuthor"
        xp:
          type: number
        level:
          type: number
        messageCount:
          type: number
      required:
        - rank
        - user
        - xp
        - level
        - messageCount
    ChatStarboardResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - messages
      description: GET /api/v1/chat/starboard — most-starred messages.
    ChatUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/ChatAuthor"
      required:
        - users
      description: GET /api/v1/chat/users?ids= — enrich authors for the realtime cache.
    ChatMembersResponse:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/ChatMember"
      required:
        - members
      description: GET /api/v1/chat/members?q= —
    ChatMember:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        avatarUrl:
          type:
            - string
            - "null"
      required:
        - id
        - username
        - avatarUrl
    DeviceTokenRequest:
      type: object
      properties:
        token:
          type: string
        platform:
          type: string
      required:
        - token
      description: POST /api/v1/account/device-token — register an APNs device token.
    DeviceTokenResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    ChatSearchResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - messages
      description: GET /api/v1/chat/search?q=&channelId= — full-text message search.
    ChatDmsResponse:
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/ChatDmConversation"
      required:
        - conversations
      description: GET /api/v1/chat/dms — the viewer's DM conversations.
    ChatDmConversation:
      type: object
      properties:
        channelId:
          type: number
        other:
          $ref: "#/components/schemas/ChatAuthor"
        lastBody:
          type:
            - string
            - "null"
        lastAt:
          type:
            - string
            - "null"
        unread:
          type: number
      required:
        - channelId
        - other
        - lastBody
        - lastAt
        - unread
      description: A DM conversation row for the inbox list.
    ChatDmOpenRequest:
      type: object
      properties:
        userId:
          type: string
      required:
        - userId
      description: POST /api/v1/chat/dms — open/create a 1:1 DM; returns it as a channel.
    ChatDmOpenResponse:
      type: object
      properties:
        channel:
          $ref: "#/components/schemas/ChatChannel"
      required:
        - channel
    FantasyChatResponse:
      type: object
      properties:
        channel:
          $ref: "#/components/schemas/ChatChannel"
      required:
        - channel
      description: POST /api/v1/fantasy/{leagues|pools}/[id]/chat — member-gated group chat.
    ChatRolesResponse:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/ChatRole"
      required:
        - roles
      description: GET /api/v1/chat/admin/roles — all roles (admin).
    CreateChatRoleRequest:
      type: object
      properties:
        key:
          type: string
        name:
          type: string
        color:
          type: string
        priority:
          type: number
      required:
        - key
        - name
        - color
      description: POST /api/v1/chat/admin/roles — create a custom role (admin).
    CreateChatRoleResponse:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/ChatRole"
      required:
        - role
    ChatRoleAssignRequest:
      type: object
      properties:
        userId:
          type: string
        roleId:
          type: number
        on:
          type: boolean
      required:
        - userId
        - roleId
      description: POST /api/v1/chat/admin/roles/assign — assign/remove (admin);
        `on:false` removes.
    ChatOkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
      description: Generic acknowledgement for chat mutations with no payload.
    ApiError:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - unauthorized
                - forbidden
                - validation
                - not_found
                - conflict
                - insufficient_funds
                - not_entitled
                - rate_limited
                - internal
            message:
              type: string
